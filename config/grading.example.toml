# Copy to config/grading.toml and replace the placeholder point values
# with the official values from the assignment brief.
Q2_1_MAX_POINTS = 1.0
Q2_2_MAX_POINTS = 3.0
Q3_1_MAX_POINTS = 2.0
Q3_2_MAX_POINTS = 2.0
Q4_MAX_POINTS = 4.0

[public_datasets]
training = "data/complaints_training.csv"
test = "data/complaints_test.csv"
modeltesting = "data/complaints_modeltesting100.csv"

[submission]
notebook_glob = "*Complaints*Notebook*.ipynb"
requirements_glob = "*_requirements.txt"
feature_engineering_glob = "feature_engineering.py"
combined_pipeline_glob = "*_Pipeline.pkl"
split_preprocessor_glob = "*_Preprocessor.pkl"
split_model_glob = "*_Model.pkl"

[q4]
timeout_seconds = 60
use_submission_requirements = false
requirements_env_root = "sandbox/q4_requirements_envs"
requirements_install_timeout_seconds = 600
requirements_reuse_envs = true

[llm]
enabled = false
fail_closed = true
provider = "openai"
model = "gpt-4.1-mini"
api_base_url = "https://api.openai.com/v1"
api_key_env_var = "OPENAI_API_KEY"
timeout_seconds = 60
temperature = 0.0
max_repair_attempts = 1
auto_accept_confidence = 7.8
soft_auto_pass_enabled = true
soft_auto_pass_min_confidence = 7.2
soft_auto_pass_min_score_ratio = 0.75
soft_auto_pass_requires_no_failures = true
soft_auto_pass_disallowed_reasons = [
  "warning_heavy_evidence_packet",
  "narrative_only_evidence_packet",
  "score_consistency_issue",
  "evidence_extraction_failed",
  "empty_evidence_packet",
  "question_section_not_found",
  "judge_evaluation_failed",
  "no_zip_found",
  "non_zip_files_present",
  "config_load_failed",
  "rubric_load_failed",
]
review_rescue_enabled = false
review_rescue_provider = "openai"
review_rescue_model = "gpt-5.4-mini"
review_rescue_min_confidence = 8.5
review_rescue_disallowed_reasons = [
  "warning_heavy_evidence_packet",
  "narrative_only_evidence_packet",
  "score_consistency_issue",
  "evidence_extraction_failed",
  "empty_evidence_packet",
  "question_section_not_found",
  "invalid_rubric_spec",
  "question_spec_missing",
  "invalid_judge_request",
  "judge_unavailable",
  "judge_evaluation_failed",
  "invalid_judge_output",
]
